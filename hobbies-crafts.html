<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>🧵 Crafts — Weird Girl Dashboard</title><link rel="stylesheet" href="shared.css">
<style>.back-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--tmut);text-decoration:none;margin-bottom:1rem;padding:5px 12px;border-radius:20px;border:1px solid var(--cbr);background:white;transition:all .15s}.back-link:hover{background:var(--chp);color:var(--ch)}
.cr-tabs{display:flex;gap:4px;flex-wrap:wrap;padding:.4rem .5rem;background:white;border:1px solid var(--cbr);border-radius:12px;margin-bottom:1rem}
.cr-tab{font-size:10px;padding:5px 12px;border-radius:20px;border:none;background:transparent;cursor:pointer;color:var(--tmut);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}.cr-tab:hover{color:#d4648a;background:#fde8f0}.cr-tab.active{background:#d4648a;color:white}
.cr-tc{display:none}.cr-tc.active{display:block}
.cr{background:white;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:.9rem 1rem;margin-bottom:.9rem;position:relative;overflow:hidden}
.cr::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#d4648a,#f0a0c0)}
.cr-t{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;color:#d4648a;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.cr-g2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}@media(max-width:700px){.cr-g2{grid-template-columns:1fr}}
.ci-item{background:white;border:1px solid rgba(0,0,0,.07);border-radius:8px;padding:6px 9px;margin-bottom:4px;font-size:11px;display:flex;align-items:flex-start;gap:6px}
.ci-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;padding:0 3px;flex-shrink:0}.ci-del:hover{color:var(--ch)}
.ci-add{display:flex;gap:5px;align-items:center;margin-top:.4rem;flex-wrap:wrap}
.ci-inp{border:1.5px solid rgba(0,0,0,.1);border-radius:7px;padding:5px 8px;font-size:11px;font-family:'DM Sans',sans-serif;background:white;outline:none;flex:1}.ci-inp:focus{border-color:#d4648a}
.ci-btn{font-size:11px;padding:4px 10px;border-radius:7px;border:1.5px solid rgba(0,0,0,.1);background:white;cursor:pointer;color:#d4648a;font-family:'DM Sans',sans-serif;font-weight:600}.ci-btn:hover{background:#fde8f0;border-color:#d4648a}
.ci-save{width:100%;margin-top:.4rem;padding:5px;border:none;border-radius:8px;background:#d4648a;color:white;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer}
textarea.ci-area{width:100%;border:1.5px solid rgba(0,0,0,.1);border-radius:8px;padding:6px 9px;font-size:11px;font-family:'DM Sans',sans-serif;background:white;resize:none;height:80px;outline:none}.ci-area:focus{border-color:#d4648a}
.archive-card{border-radius:10px;padding:8px 10px;margin-bottom:5px;font-size:11px;position:relative}
.archive-card.loved{background:#eafaf1;border:1px solid rgba(39,174,96,.2)}
.archive-card.nope{background:#f5f5f5;border:1px solid rgba(0,0,0,.08)}
</style></head><body>
<nav class="nav" id="main-nav"></nav>
<div class="db">
<a href="hobbies.html" class="back-link">← Back to Hobbies</a>
<div style="text-align:center;margin-bottom:1.2rem"><div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#d4648a">🧵 Crafts</div><div style="font-size:11px;color:var(--tmut);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Make beautiful things with your hands</div></div>

<div class="cr-tabs"><button class="cr-tab active" onclick="crTab('projects')">🗂️ Projects</button><button class="cr-tab" onclick="crTab('howto')">📋 How-To Guides</button><button class="cr-tab" onclick="crTab('supplies')">🧰 Supplies</button><button class="cr-tab" onclick="crTab('loved')">💖 Loved It</button><button class="cr-tab" onclick="crTab('nope')">👎 Archived</button></div>

<!-- PROJECTS --><div class="cr-tc active" id="crt-projects"><div class="cr"><div class="cr-t">🎨 Active projects</div><div id="craft-projects"></div>
<div class="ci-add"><input class="ci-inp" id="cp-name" placeholder="Project name..."><select class="ci-inp" id="cp-type" style="flex:none;width:100px"><option>Sewing</option><option>Crochet</option><option>Painting</option><option>Jewelry</option><option>Paper craft</option><option>Resin</option><option>Other</option></select><select class="ci-inp" id="cp-status" style="flex:none;width:90px"><option>Queue</option><option>In progress</option><option>Done</option></select><button class="ci-btn" onclick="addProject()">+</button></div></div></div>

<!-- HOW-TO --><div class="cr-tc" id="crt-howto"><div class="cr"><div class="cr-t">📋 Step-by-step how-to guides<span style="font-size:9px;color:var(--tmut);font-family:'DM Sans',sans-serif;font-weight:400;margin-left:6px">Create your own craft guides!</span></div>
<div class="ci-add" style="margin-bottom:.7rem"><input class="ci-inp" id="ht-title" placeholder="Guide title (e.g. How to crochet a granny square)"><button class="ci-btn" onclick="addGuide()">+ New guide</button></div>
<div id="craft-guides"></div></div></div>

<!-- SUPPLIES --><div class="cr-tc" id="crt-supplies"><div class="cr-g2"><div class="cr"><div class="cr-t">✅ Supplies I have</div><div id="craft-have"></div><div class="ci-add"><input class="ci-inp" id="cs-have-inp" placeholder="Supply..."><button class="ci-btn" onclick="cAdd('craft-have','cs-have-inp','wh_craft_supplies_have')">+</button></div></div>
<div class="cr"><div class="cr-t">🛒 Need to buy</div><div id="craft-need"></div><div class="ci-add"><input class="ci-inp" id="cs-need-inp" placeholder="Need..."><button class="ci-btn" onclick="cAdd('craft-need','cs-need-inp','wh_craft_supplies_need')">+</button></div></div></div></div>

<!-- LOVED --><div class="cr-tc" id="crt-loved"><div class="cr"><div class="cr-t">💖 Crafts I loved<span style="font-size:9px;color:var(--tmut);font-family:'DM Sans',sans-serif;font-weight:400;margin-left:6px">The ones that made you happy</span></div>
<div class="ci-add" style="margin-bottom:.5rem"><input class="ci-inp" id="loved-name" placeholder="Craft name..."><input class="ci-inp" id="loved-why" placeholder="Why you loved it..." style="flex:2"><button class="ci-btn" onclick="addArchive('loved')">+</button></div>
<div id="craft-loved"></div></div></div>

<!-- NOPE --><div class="cr-tc" id="crt-nope"><div class="cr"><div class="cr-t">👎 Archived — not for me<span style="font-size:9px;color:var(--tmut);font-family:'DM Sans',sans-serif;font-weight:400;margin-left:6px">Honest! No shame!</span></div>
<div class="ci-add" style="margin-bottom:.5rem"><input class="ci-inp" id="nope-name" placeholder="Craft name..."><input class="ci-inp" id="nope-why" placeholder="Why it wasn't for you..." style="flex:2"><button class="ci-btn" onclick="addArchive('nope')">+</button></div>
<div id="craft-nope"></div></div></div>
</div>

<script type="module" src="shared.js"></script>
<script type="module">
renderNav('hobbies');
window.crTab=t=>{document.querySelectorAll('.cr-tc').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.cr-tab').forEach(b=>b.classList.remove('active'));document.getElementById('crt-'+t).classList.add('active');document.querySelectorAll('.cr-tab').forEach(b=>{if(b.textContent.toLowerCase().includes(t.substring(0,3)))b.classList.add('active')})};

// Lists
function cR(c,k){const el=document.getElementById(c);if(!el)return;const items=ls(k,[]);el.innerHTML='';if(!items.length){el.innerHTML='<div style="text-align:center;padding:.5rem;color:var(--tmut);font-size:10px;font-style:italic;opacity:.7">Nothing yet</div>';return}items.forEach((t,i)=>{const txt=typeof t==='string'?t:t.text||'';const e=document.createElement('div');e.className='ci-item';e.innerHTML='<span style="flex:1">'+txt+'</span><button class="ci-del" onclick="cD(\''+c+'\',\''+k+'\','+i+')">×</button>';el.appendChild(e)})}
window.cAdd=(c,iid,k)=>{const inp=document.getElementById(iid);if(!inp)return;const v=inp.value.trim();if(!v)return;const items=ls(k,[]);items.push(v);ss(k,items);inp.value='';cR(c,k)};
window.cD=(c,k,i)=>{const items=ls(k,[]);items.splice(i,1);ss(k,items);cR(c,k)};

// Projects
let projects=ls('wh_craft_projects',[]);
function renderProjects(){const c=document.getElementById('craft-projects');if(!c)return;c.innerHTML='';if(!projects.length){c.innerHTML='<div style="text-align:center;padding:1rem;color:var(--tmut);font-size:10px;font-style:italic">No projects yet — start creating!</div>';return}
projects.forEach((p,i)=>{const colors={Queue:'var(--tmut)','In progress':'#e07b39',Done:'var(--green)'};const e=document.createElement('div');e.className='ci-item';e.innerHTML='<div style="flex:1"><div style="font-weight:600">'+p.name+'</div><div style="font-size:9px;color:var(--tmut);margin-top:2px">'+p.type+' · <span style="color:'+(colors[p.status]||'var(--tmut)')+'">'+p.status+'</span></div></div><select class="ci-inp" style="flex:none;width:90px;font-size:9px" onchange="updateProjectStatus('+i+',this.value)"><option '+(p.status==='Queue'?'selected':'')+'>Queue</option><option '+(p.status==='In progress'?'selected':'')+'>In progress</option><option '+(p.status==='Done'?'selected':'')+'>Done</option></select><button class="ci-del" onclick="delProject('+i+')">×</button>';c.appendChild(e)})}
window.addProject=()=>{const n=document.getElementById('cp-name').value.trim();if(!n)return;projects.push({name:n,type:document.getElementById('cp-type').value,status:document.getElementById('cp-status').value});ss('wh_craft_projects',projects);document.getElementById('cp-name').value='';renderProjects()};
window.updateProjectStatus=(i,s)=>{projects[i].status=s;ss('wh_craft_projects',projects)};
window.delProject=i=>{projects.splice(i,1);ss('wh_craft_projects',projects);renderProjects()};
renderProjects();

// How-to guides
let guides=ls('wh_craft_guides',[]);
function renderGuides(){const c=document.getElementById('craft-guides');if(!c)return;c.innerHTML='';if(!guides.length){c.innerHTML='<div style="text-align:center;padding:1rem;color:var(--tmut);font-size:10px;font-style:italic">No guides yet — create your first step-by-step!</div>';return}
guides.forEach((g,gi)=>{const card=document.createElement('div');card.className='cr';card.style.cssText='cursor:pointer';
card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div class="cr-t" style="margin:0">📋 '+g.title+'</div><div style="display:flex;gap:4px"><span style="font-size:9px;color:var(--tmut)">'+g.steps.length+' steps</span><button class="ci-del" onclick="event.stopPropagation();delGuide('+gi+')">×</button></div></div>';
card.onclick=()=>toggleGuide(gi);
const body=document.createElement('div');body.id='guide-body-'+gi;body.style.cssText='display:none;margin-top:.7rem;border-top:1px solid rgba(0,0,0,.06);padding-top:.5rem';
let stepsHtml='';g.steps.forEach((s,si)=>{stepsHtml+='<div style="display:flex;gap:6px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:10px;align-items:flex-start"><span style="font-weight:700;color:#d4648a;min-width:20px">'+(si+1)+'.</span><span style="flex:1">'+s+'</span><button class="ci-del" onclick="event.stopPropagation();delStep('+gi+','+si+')">×</button></div>'});
body.innerHTML=stepsHtml+'<div class="ci-add" style="margin-top:.4rem"><input class="ci-inp" id="step-inp-'+gi+'" placeholder="Add a step..." onclick="event.stopPropagation()"><button class="ci-btn" onclick="event.stopPropagation();addStep('+gi+')">+ Step</button></div>';
card.appendChild(body);c.appendChild(card)})}
window.toggleGuide=i=>{const b=document.getElementById('guide-body-'+i);if(b)b.style.display=b.style.display==='none'?'block':'none'};
window.addGuide=()=>{const t=document.getElementById('ht-title').value.trim();if(!t)return;guides.push({title:t,steps:[]});ss('wh_craft_guides',guides);document.getElementById('ht-title').value='';renderGuides()};
window.addStep=(gi)=>{const inp=document.getElementById('step-inp-'+gi);if(!inp)return;const v=inp.value.trim();if(!v)return;guides[gi].steps.push(v);ss('wh_craft_guides',guides);inp.value='';renderGuides();document.getElementById('guide-body-'+gi).style.display='block'};
window.delStep=(gi,si)=>{guides[gi].steps.splice(si,1);ss('wh_craft_guides',guides);renderGuides();document.getElementById('guide-body-'+gi).style.display='block'};
window.delGuide=i=>{if(confirm('Delete this guide?')){guides.splice(i,1);ss('wh_craft_guides',guides);renderGuides()}};
renderGuides();

// Archives
function renderArchive(type){const c=document.getElementById('craft-'+type);if(!c)return;const items=ls('wh_craft_'+type,[]);c.innerHTML='';if(!items.length){c.innerHTML='<div style="text-align:center;padding:.5rem;color:var(--tmut);font-size:10px;font-style:italic">None yet</div>';return}
items.forEach((item,i)=>{const e=document.createElement('div');e.className='archive-card '+type;e.innerHTML='<div style="font-weight:600">'+item.name+'</div><div style="font-size:9px;color:var(--tmut);margin-top:2px;font-style:italic">'+(item.why||'')+'</div><button class="ci-del" style="position:absolute;top:6px;right:6px" onclick="delArchive(\''+type+'\','+i+')">×</button>';e.style.position='relative';c.appendChild(e)})}
window.addArchive=type=>{const name=document.getElementById(type+'-name').value.trim();if(!name)return;const why=document.getElementById(type+'-why').value.trim();const items=ls('wh_craft_'+type,[]);items.push({name,why});ss('wh_craft_'+type,items);document.getElementById(type+'-name').value='';document.getElementById(type+'-why').value='';renderArchive(type)};
window.delArchive=(type,i)=>{const items=ls('wh_craft_'+type,[]);items.splice(i,1);ss('wh_craft_'+type,items);renderArchive(type)};

cR('craft-have','wh_craft_supplies_have');cR('craft-need','wh_craft_supplies_need');
renderArchive('loved');renderArchive('nope');
</script></body></html>
