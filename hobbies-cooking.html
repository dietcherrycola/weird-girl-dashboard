<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>🍳 Cooking Hobby — Weird Girl Dashboard</title><link rel="stylesheet" href="shared.css">
<style>.back-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--tmut);text-decoration:none;margin-bottom:1rem;padding:5px 12px;border-radius:20px;border:1px solid var(--cbr);background:white;transition:all .15s}.back-link:hover{background:var(--chp);color:var(--ch)}
.ck-tabs{display:flex;gap:4px;flex-wrap:wrap;padding:.4rem .5rem;background:white;border:1px solid var(--cbr);border-radius:12px;margin-bottom:1rem}
.ck-tab{font-size:10px;padding:5px 12px;border-radius:20px;border:none;background:transparent;cursor:pointer;color:var(--tmut);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}.ck-tab:hover{color:#e07b39;background:#fef3e7}.ck-tab.active{background:#e07b39;color:white}
.ck-tc{display:none}.ck-tc.active{display:block}
.ck{background:white;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:.9rem 1rem;margin-bottom:.9rem;position:relative;overflow:hidden}
.ck::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e07b39,#f0a060)}
.ck-t{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;color:#e07b39;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.ck-g2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}@media(max-width:700px){.ck-g2{grid-template-columns:1fr}}
.recipe-card{background:white;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:10px 12px;margin-bottom:7px;transition:all .15s;position:relative}
.recipe-card:hover{border-color:rgba(224,123,57,.3);box-shadow:0 2px 8px rgba(224,123,57,.08)}
.ri{display:flex;gap:5px;align-items:center;margin-top:.4rem;flex-wrap:wrap}
.ri-inp{border:1.5px solid rgba(0,0,0,.1);border-radius:7px;padding:5px 8px;font-size:11px;font-family:'DM Sans',sans-serif;background:white;outline:none;flex:1}.ri-inp:focus{border-color:#e07b39}
.ri-btn{font-size:11px;padding:4px 10px;border-radius:7px;border:1.5px solid rgba(0,0,0,.1);background:white;cursor:pointer;color:#e07b39;font-family:'DM Sans',sans-serif;font-weight:600}.ri-btn:hover{background:#fef3e7;border-color:#e07b39}
.ri-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;padding:0 3px}.ri-del:hover{color:var(--ch)}
textarea.ri-area{width:100%;border:1.5px solid rgba(0,0,0,.1);border-radius:8px;padding:6px 9px;font-size:11px;font-family:'DM Sans',sans-serif;background:white;resize:none;height:80px;outline:none}.ri-area:focus{border-color:#e07b39}
.ri-save{width:100%;margin-top:.4rem;padding:5px;border:none;border-radius:8px;background:#e07b39;color:white;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer}
.star-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:0 1px}
</style></head><body>
<nav class="nav" id="main-nav"></nav>
<div class="db">
<a href="hobbies.html" class="back-link">← Back to Hobbies</a>
<div style="text-align:center;margin-bottom:1.2rem"><div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#e07b39">🍳 Cooking</div><div style="font-size:11px;color:var(--tmut);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Every cook has a journey</div></div>

<div class="ck-tabs"><button class="ck-tab active" onclick="ckTab('book')">📖 Shan's Recipe Book</button><button class="ck-tab" onclick="ckTab('try')">🔍 To Try</button><button class="ck-tab" onclick="ckTab('archive')">📦 Archived</button><button class="ck-tab" onclick="ckTab('tips')">💡 Tips</button></div>

<!-- RECIPE BOOK --><div class="ck-tc active" id="ckt-book"><div class="ck"><div class="ck-t">📖 Shan's Recipe Book<span style="font-size:9px;color:var(--tmut);font-family:'DM Sans',sans-serif;font-weight:400;margin-left:6px">Recipes you tried and loved!</span></div>
<div class="ri" style="margin-bottom:.7rem"><input class="ri-inp" id="rb-name" placeholder="Recipe name..."><input class="ri-inp" id="rb-cuisine" placeholder="Cuisine" style="flex:none;width:80px"><button class="ri-btn" onclick="addRecipeBook()">+ Add to book</button></div>
<div id="recipe-book"></div></div></div>

<!-- TO TRY --><div class="ck-tc" id="ckt-try"><div class="ck"><div class="ck-t">🔍 Recipes to try</div>
<div class="ri" style="margin-bottom:.5rem"><input class="ri-inp" id="rt-name" placeholder="Recipe name..."><input class="ri-inp" id="rt-source" placeholder="Source (URL, book, TikTok...)" style="flex:2"><button class="ri-btn" onclick="addToTry()">+</button></div>
<div id="recipes-try"></div></div></div>

<!-- ARCHIVE --><div class="ck-tc" id="ckt-archive"><div class="ck-g2"><div class="ck"><div class="ck-t" style="color:var(--green)">👍 Liked but not keeping</div><div id="archive-liked"></div>
<div class="ri"><input class="ri-inp" id="al-name" placeholder="Recipe..."><input class="ri-inp" id="al-why" placeholder="Why..." style="flex:2"><button class="ri-btn" onclick="addArch('liked')">+</button></div></div>
<div class="ck"><div class="ck-t" style="color:var(--ch)">👎 Didn't like</div><div id="archive-nope"></div>
<div class="ri"><input class="ri-inp" id="an-name" placeholder="Recipe..."><input class="ri-inp" id="an-why" placeholder="Why..." style="flex:2"><button class="ri-btn" onclick="addArch('nope')">+</button></div></div></div></div>

<!-- TIPS --><div class="ck-tc" id="ckt-tips"><div class="ck"><div class="ck-t">💡 Cooking tips & lessons learned</div><div id="cooking-tips"></div>
<div class="ri"><input class="ri-inp" id="tip-inp" placeholder="Something you learned..."><button class="ri-btn" onclick="addTip()">+</button></div></div>
<div class="ck"><div class="ck-t">🩸 T1D-friendly cooking notes</div>
<div id="t1d-tips"></div></div></div>
</div>

<script type="module" src="shared.js"></script>
<script type="module">
renderNav('hobbies');
window.ckTab=t=>{document.querySelectorAll('.ck-tc').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.ck-tab').forEach(b=>b.classList.remove('active'));document.getElementById('ckt-'+t).classList.add('active');document.querySelectorAll('.ck-tab').forEach(b=>{if(b.textContent.toLowerCase().includes(t.substring(0,3)))b.classList.add('active')})};

// Recipe book
let recipeBook=ls('wh_recipe_book',[]);
function renderBook(){const c=document.getElementById('recipe-book');if(!c)return;c.innerHTML='';if(!recipeBook.length){c.innerHTML='<div style="text-align:center;padding:1rem;color:var(--tmut);font-size:10px;font-style:italic">Your recipe book is empty — cook something and add it!</div>';return}
recipeBook.forEach((r,i)=>{const stars='⭐'.repeat(r.rating||0)+'☆'.repeat(5-(r.rating||0));const e=document.createElement('div');e.className='recipe-card';e.innerHTML='<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:12px;font-weight:700;color:#e07b39">'+r.name+'</div><div style="font-size:9px;color:var(--tmut);margin-top:2px">'+(r.cuisine||'')+(r.notes?' · '+r.notes:'')+'</div></div><div style="display:flex;gap:2px;align-items:center">'+[1,2,3,4,5].map(s=>'<button class="star-btn" onclick="rateRecipe('+i+','+s+')">'+(s<=(r.rating||0)?'⭐':'☆')+'</button>').join('')+'<button class="ri-del" style="margin-left:4px" onclick="delBook('+i+')">×</button></div></div>';c.appendChild(e)})}
window.addRecipeBook=()=>{const n=document.getElementById('rb-name').value.trim();if(!n)return;recipeBook.push({name:n,cuisine:document.getElementById('rb-cuisine').value.trim(),rating:0,notes:''});ss('wh_recipe_book',recipeBook);document.getElementById('rb-name').value='';document.getElementById('rb-cuisine').value='';renderBook()};
window.rateRecipe=(i,r)=>{recipeBook[i].rating=r;ss('wh_recipe_book',recipeBook);renderBook()};
window.delBook=i=>{recipeBook.splice(i,1);ss('wh_recipe_book',recipeBook);renderBook()};
renderBook();

// To try
let toTry=ls('wh_recipes_try',[]);
function renderTry(){const c=document.getElementById('recipes-try');if(!c)return;c.innerHTML='';if(!toTry.length){c.innerHTML='<div style="text-align:center;padding:.5rem;color:var(--tmut);font-size:10px;font-style:italic">Nothing queued up</div>';return}
toTry.forEach((r,i)=>{const e=document.createElement('div');e.style.cssText='display:flex;gap:6px;padding:5px 8px;border:1px solid rgba(0,0,0,.07);border-radius:7px;font-size:11px;margin-bottom:3px;align-items:center';e.innerHTML='<span style="flex:1;font-weight:500">'+r.name+'</span><span style="font-size:9px;color:var(--tmut)">'+( r.source||'')+'</span><button class="ri-btn" style="font-size:9px;padding:2px 6px" onclick="triedIt('+i+')">Tried it!</button><button class="ri-del" onclick="delTry('+i+')">×</button>';c.appendChild(e)})}
window.addToTry=()=>{const n=document.getElementById('rt-name').value.trim();if(!n)return;toTry.push({name:n,source:document.getElementById('rt-source').value.trim()});ss('wh_recipes_try',toTry);document.getElementById('rt-name').value='';document.getElementById('rt-source').value='';renderTry()};
window.triedIt=i=>{const r=toTry.splice(i,1)[0];ss('wh_recipes_try',toTry);recipeBook.push({name:r.name,cuisine:'',rating:0,notes:'From: '+(r.source||'')});ss('wh_recipe_book',recipeBook);renderTry();renderBook();alert(r.name+' moved to your recipe book! Rate it there ⭐')};
window.delTry=i=>{toTry.splice(i,1);ss('wh_recipes_try',toTry);renderTry()};
renderTry();

// Archives
function renderArch(type){const c=document.getElementById('archive-'+type);if(!c)return;const items=ls('wh_cook_archive_'+type,[]);c.innerHTML='';if(!items.length){c.innerHTML='<div style="text-align:center;padding:.5rem;color:var(--tmut);font-size:10px;font-style:italic">None yet</div>';return}
items.forEach((item,i)=>{const e=document.createElement('div');e.style.cssText='padding:5px 8px;border:1px solid rgba(0,0,0,.06);border-radius:7px;margin-bottom:3px;font-size:11px;display:flex;gap:6px;align-items:flex-start;position:relative';e.innerHTML='<div style="flex:1"><span style="font-weight:600">'+item.name+'</span>'+(item.why?' — <span style="font-style:italic;color:var(--tmut)">'+item.why+'</span>':'')+'</div><button class="ri-del" onclick="delArch(\''+type+'\','+i+')">×</button>';c.appendChild(e)})}
window.addArch=type=>{const n=document.getElementById('a'+type.charAt(0)+'-name').value.trim();if(!n)return;const w=document.getElementById('a'+type.charAt(0)+'-why').value.trim();const items=ls('wh_cook_archive_'+type,[]);items.push({name:n,why:w});ss('wh_cook_archive_'+type,items);document.getElementById('a'+type.charAt(0)+'-name').value='';document.getElementById('a'+type.charAt(0)+'-why').value='';renderArch(type)};
window.delArch=(type,i)=>{const items=ls('wh_cook_archive_'+type,[]);items.splice(i,1);ss('wh_cook_archive_'+type,items);renderArch(type)};
renderArch('liked');renderArch('nope');

// Tips
let tips=ls('wh_cooking_tips',[]);
function renderTips(){const c=document.getElementById('cooking-tips');if(!c)return;c.innerHTML='';tips.forEach((t,i)=>{const e=document.createElement('div');e.style.cssText='display:flex;gap:6px;padding:5px 8px;background:white;border:1px solid rgba(0,0,0,.06);border-radius:7px;font-size:11px;margin-bottom:3px;align-items:center';e.innerHTML='<span>💡</span><span style="flex:1">'+t+'</span><button class="ri-del" onclick="delTip('+i+')">×</button>';c.appendChild(e)})}
window.addTip=()=>{const v=document.getElementById('tip-inp').value.trim();if(!v)return;tips.push(v);ss('wh_cooking_tips',tips);document.getElementById('tip-inp').value='';renderTips()};
window.delTip=i=>{tips.splice(i,1);ss('wh_cooking_tips',tips);renderTips()};
renderTips();

// T1D tips
[{t:'Pair carbs with protein + fat',d:'Slows glucose spike'},{t:'Eat within 30min of waking',d:'Stabilize blood sugar'},{t:'Prep base proteins on Sunday',d:'Low-energy day insurance'},{t:'Cauliflower rice swap',d:'Fraction of the carbs'},{t:'Test blood sugar before & 2hrs after new recipes',d:'Know YOUR body\'s response'}].forEach(tip=>{const e=document.createElement('div');e.style.cssText='display:flex;gap:8px;padding:7px 9px;background:#fef3e7;border:1px solid rgba(224,123,57,.15);border-radius:8px;margin-bottom:5px;font-size:11px';e.innerHTML='<span>🩸</span><div><div style="font-weight:600">'+tip.t+'</div><div style="font-size:9px;color:var(--tmut);margin-top:1px">'+tip.d+'</div></div>';document.getElementById('t1d-tips').appendChild(e)});
</script></body></html>
