<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Learning Hub — Weird Girl Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Nunito:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#fdf6f0;--tm:#1a0a0a;--muted:#6b3a3a;
  --ch:#c0392b;--chp:#fde8e8;--chd:#7b241c;
  --border:rgba(192,57,43,0.13);--cbg:rgba(255,255,255,.97);
  --green:#27ae60;--green-light:#eafaf1;--yellow:#f0a500;--yellow-light:#fef9e7;
  --purple:#8e44ad;--purple-light:#f3eafb;--blue:#2980b9;--blue-light:#e8f4fd;
  --orange:#e67e22;--teal:#16a085;--pink:#e91e8c;--red:#c0392b;
  --gold:#c9a84c;
  --shadow:0 2px 8px rgba(0,0,0,.04);--shadow-lg:0 4px 16px rgba(0,0,0,.08);
}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--tm);min-height:100vh}

/* === BACK NAV === */
.back-bar{position:sticky;top:0;z-index:100;background:white;border-bottom:1px solid var(--border);padding:.5rem .8rem;display:flex;align-items:center;gap:10px}
.back-btn{font-size:11px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;cursor:pointer;color:var(--ch);font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--chp);border-color:var(--ch)}
.back-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--chd)}

/* === HUB CONTAINER === */
.hub{max-width:1120px;margin:0 auto;padding:1.2rem 1rem 3rem}

/* === HUB HEADER === */
.hub-header{text-align:center;margin-bottom:1.5rem}
.hub-header h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--chd)}
.hub-header-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

/* === OVERVIEW STATS === */
.overview-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:1.2rem}
@media(max-width:700px){.overview-stats{grid-template-columns:1fr 1fr}}
.stat-card{background:white;border:1px solid var(--border);border-radius:12px;padding:10px 12px;box-shadow:var(--shadow)}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px}
.stat-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--chd)}
.stat-sub{font-size:9px;color:var(--muted);margin-top:2px}

/* === ALERTS === */
.alert-bar{background:var(--chp);border:1.5px solid rgba(192,57,43,.25);border-radius:12px;padding:.7rem 1rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--chd);font-weight:500}
.alert-bar.warning{background:var(--yellow-light);border-color:rgba(240,165,0,.3);color:#7a5400}
.alert-count{background:var(--ch);color:white;font-size:9px;border-radius:20px;padding:1px 7px;font-weight:700}

/* === PILLAR GRID (main dashboard view) === */
.pillar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.2rem}
@media(max-width:900px){.pillar-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.pillar-grid{grid-template-columns:1fr}}
.pillar-widget{background:white;border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.pillar-widget:hover{border-color:var(--ch);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.pillar-widget::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc,var(--ch))}
.pw-top{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}
.pw-emoji{font-size:24px;flex-shrink:0}
.pw-name{font-size:12px;font-weight:700;color:var(--tm)}
.pw-level{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.pw-needs{display:flex;gap:3px;margin-bottom:6px}
.pw-need-pip{flex:1;height:6px;border-radius:3px;background:rgba(0,0,0,.06);overflow:hidden}
.pw-need-fill{height:100%;border-radius:3px;transition:width .4s}
.pw-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--muted)}
.pw-alert{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--ch);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* === VIEW TOGGLE === */
.view-toggle{display:flex;gap:4px;margin-bottom:1rem}
.vt-btn{font-size:10px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s}
.vt-btn:hover{background:var(--chp);color:var(--ch)}
.vt-btn.active{background:var(--ch);color:white;border-color:var(--ch)}

/* === CATEGORY FILTERS === */
.cat-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.cat-btn{font-size:10px;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:white;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.cat-btn:hover{background:var(--chp)}
.cat-btn.active{background:var(--ch);color:white;border-color:var(--ch)}

/* === PILLAR PAGE === */
.pillar-page{display:none;animation:fadeIn .25s ease}
.pillar-page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.pp-hero{border-radius:16px;padding:1.2rem 1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;color:white}
.pp-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pc) 0%,color-mix(in srgb,var(--pc) 60%,#1a0a0a) 100%)}
.pp-hero-inner{position:relative;z-index:1}
.pp-hero-emoji{font-size:2.5rem;margin-bottom:8px;display:block}
.pp-hero h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;margin-bottom:4px}
.pp-hero-sub{font-size:11px;opacity:.8;line-height:1.5}
.pp-hero-level{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;margin-top:8px;backdrop-filter:blur(4px)}
.pp-back{font-size:11px;padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);cursor:pointer;color:white;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;position:absolute;top:1rem;right:1rem;z-index:2;backdrop-filter:blur(4px)}
.pp-back:hover{background:rgba(255,255,255,.3)}

/* === INNER TABS === */
.pp-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem;padding:.4rem .5rem;background:white;border:1px solid var(--border);border-radius:12px}
.pp-tab{font-size:10px;padding:4px 11px;border-radius:20px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}
.pp-tab:hover{color:var(--ch);background:var(--chp)}
.pp-tab.active{background:var(--ch);color:white}
.pp-tab-content{display:none}.pp-tab-content.active{display:block}

/* === CARDS === */
.card{background:white;border:1px solid var(--border);border-radius:16px;padding:1rem 1.1rem;position:relative;overflow:hidden;margin-bottom:.9rem;box-shadow:var(--shadow)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pc,var(--chd)),color-mix(in srgb,var(--pc,var(--ch)) 70%,white))}
.ct{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--chd);margin-bottom:.75rem;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ci{width:22px;height:22px;background:var(--chp);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ct-right{margin-left:auto}

/* === LAYOUT === */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.9rem;margin-bottom:.9rem}
@media(max-width:700px){.g2,.g3{grid-template-columns:1fr}}

/* === NEEDS BARS (Sims 4 Style) === */
.need-bar{margin-bottom:8px}
.need-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.need-name{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.need-status{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px}
.need-track{height:14px;background:rgba(0,0,0,.06);border-radius:7px;overflow:hidden;border:1px solid rgba(0,0,0,.06);position:relative}
.need-fill{height:100%;border-radius:7px;transition:width .5s ease,background .5s;position:relative}
.need-fill::after{content:'';position:absolute;top:2px;left:4px;right:4px;height:4px;border-radius:2px;background:rgba(255,255,255,.3)}
.need-fill.critical{animation:needFlash 1s ease-in-out infinite}
@keyframes needFlash{0%,100%{opacity:1}50%{opacity:.6}}
.need-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:2px}
.need-log-btn{font-size:9px;padding:2px 8px;border-radius:5px;border:1px solid var(--border);background:white;cursor:pointer;color:var(--ch);font-family:'DM Sans',sans-serif;transition:all .15s}
.need-log-btn:hover{background:var(--chp);border-color:var(--ch)}

/* === MILESTONES === */
.milestone{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:5px;transition:all .15s;cursor:pointer}
.milestone:hover{border-color:var(--ch)}
.milestone.done{background:var(--green-light);border-color:rgba(39,174,96,.3)}
.ms-check{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.ms-check.done{background:var(--green);border-color:var(--green);color:white}
.ms-text{flex:1;font-size:11px;line-height:1.4}
.ms-text.done-text{text-decoration:line-through;opacity:.5}
.ms-level{font-size:8px;padding:1px 6px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}

/* === SKILL LEVEL PROGRESS === */
.level-track{display:flex;gap:2px;margin-bottom:.8rem}
.level-seg{flex:1;height:8px;border-radius:4px;background:rgba(0,0,0,.06);overflow:hidden;position:relative;cursor:pointer;transition:all .15s}
.level-seg:hover{transform:scaleY(1.3)}
.level-seg-fill{height:100%;border-radius:4px;transition:width .4s}
.level-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;margin-bottom:.5rem}

/* === CHECKLIST === */
.check-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-bottom:1px solid var(--border);font-size:11px;line-height:1.4}
.check-item:last-child{border-bottom:none}
.check-box{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;font-size:9px}
.check-box.done{background:var(--green);border-color:var(--green);color:white}
.check-text{flex:1}.check-text.done-text{text-decoration:line-through;opacity:.5}

/* === GUIDE SECTIONS === */
.guide-section{margin-bottom:1rem}
.guide-h{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;color:var(--chd);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.guide-p{font-size:11px;line-height:1.7;color:var(--tm);margin-bottom:.5rem}
.guide-tip{background:var(--yellow-light);border:1px solid rgba(240,165,0,.2);border-radius:9px;padding:7px 10px;font-size:10px;margin-bottom:.5rem;display:flex;align-items:flex-start;gap:6px}
.guide-cheese{background:#f3eafb;border:1px solid rgba(142,68,173,.2);border-radius:9px;padding:7px 10px;font-size:10px;margin-bottom:.5rem;display:flex;align-items:flex-start;gap:6px}

/* === INPUTS & BUTTONS === */
.inp{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--tm);background:white;outline:none;transition:border .15s}
.inp:focus{border-color:var(--ch)}
.inp-full{width:100%}
.btn{border:none;border-radius:10px;padding:7px 14px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:600;transition:all .15s}
.btn-red{background:var(--ch);color:white}.btn-red:hover{background:var(--chd)}
.btn-green{background:var(--green);color:white}.btn-green:hover{background:#1a6b3c}
.btn-outline{background:white;color:var(--ch);border:1.5px solid var(--border)}.btn-outline:hover{background:var(--chp)}
.btn-sm{font-size:10px;padding:3px 9px;border-radius:6px;border:1.5px solid var(--border);background:white;cursor:pointer;color:var(--ch);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.btn-sm:hover{background:var(--chp)}
.btn-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;padding:0 3px;transition:color .15s}.btn-del:hover{color:var(--red)}
.row{display:flex;gap:6px;align-items:center;margin-bottom:.5rem;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.sdiv{height:1px;background:var(--border);margin:.7rem 0}
.empty-s{text-align:center;padding:1.5rem;color:var(--muted);font-size:11px;font-style:italic;opacity:.7}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(192,57,43,.2);border-radius:2px}
</style>
</head>
<body>

<!-- BACK BAR -->
<div class="back-bar">
  <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
  <span class="back-title">🧠 Learning Hub</span>
</div>

<!-- MAIN HUB VIEW -->
<div id="hub-main">
<div class="hub">

</div>

<!-- OVERVIEW STATS -->
<div class="overview-stats" id="overview-stats"></div>

<!-- DECAY ALERTS -->
<div id="decay-alerts"></div>

<div class="cat-filters" id="cat-filters">
  <button class="cat-btn active" onclick="filterCat('all')">All</button>
  <button class="cat-btn" onclick="filterCat('creative')">🎨 Creative</button>
  <button class="cat-btn" onclick="filterCat('language')">🌍 Languages</button>
  <button class="cat-btn" onclick="filterCat('coding')">💻 Coding</button>

</div>

<!-- PILLAR GRID -->
<div class="pillar-grid" id="pillar-grid"></div>

</div>
</div>

<!-- PILLAR DETAIL PAGES (rendered dynamically) -->
<div id="pillar-pages"></div>

<script>

const PILLARS = [

    levels:['Beginner','Novice','Intermediate','Advanced','Master'],

function ls(k,d){try{const r=localStorage.getItem(k);return r?JSON.parse(r):d}catch{return d}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function todayStr(){return new Date().toISOString().split('T')[0]}

// ========================= STATE =========================
// Per-pillar state stored in localStorage
function getState(id){
  return ls('wg_learn_'+id,{
    milestones:{},  // {index: true} for completed
    steps:{},       // {index: true} for completed
    needLogs:{},    // {needIndex: lastLogDate}
    level:0,        // current level index
    notes:'',
    customMilestones:[]
  });
}
function saveState(id,state){ss('wg_learn_'+id,state)}

// ========================= DECAY CALC =========================
function calcNeedPct(need, lastLog){
  if(!lastLog) return 0;
  const now = new Date();
  const last = new Date(lastLog);
  const daysSince = Math.max(0,(now - last) / 86400000);
  const pct = Math.max(0, 100 - (daysSince / need.decayDays * 100));
  return Math.round(pct);
}

function getNeedColor(pct){
  if(pct >= 70) return 'var(--green)';
  if(pct >= 40) return 'var(--yellow)';
  return 'var(--ch)';
}

function getNeedStatus(pct){
  if(pct >= 70) return {text:'Good',bg:'var(--green-light)',color:'var(--green)'};
  if(pct >= 40) return {text:'Decaying',bg:'var(--yellow-light)',color:'#7a5400'};
  return {text:'Critical!',bg:'var(--chp)',color:'var(--ch)'};
}

// ========================= LEVEL CALC =========================
function calcLevel(pillar, state){
  const ms = pillar.milestones;
  let levelCounts = pillar.levels.map(()=>({total:0,done:0}));
  ms.forEach((m,i)=>{
    levelCounts[m.level].total++;
    if(state.milestones[i]) levelCounts[m.level].done++;
  });
  // Level is the highest level where all milestones are complete
  let level = 0;
  for(let i=0;i<levelCounts.length;i++){
    if(levelCounts[i].total>0 && levelCounts[i].done>=levelCounts[i].total) level=i+1;
    else break;
  }
  return Math.min(level, pillar.levels.length-1);
}

function overallProgress(pillar, state){
  const total = pillar.milestones.length;
  const done = Object.keys(state.milestones).filter(k=>state.milestones[k]).length;
  return total>0 ? Math.round(done/total*100) : 0;
}

// ========================= RENDER OVERVIEW =========================
function renderOverview(){
  let totalPillars=PILLARS.length, activePillars=0, criticalNeeds=0, totalMilestones=0, doneMilestones=0;
  
  PILLARS.forEach(p=>{
    const state=getState(p.id);
    const hasDone=Object.keys(state.milestones).some(k=>state.milestones[k]) || Object.keys(state.steps).some(k=>state.steps[k]) || Object.keys(state.needLogs).length>0;
    if(hasDone) activePillars++;
    totalMilestones+=p.milestones.length;
    doneMilestones+=Object.keys(state.milestones).filter(k=>state.milestones[k]).length;
    p.needs.forEach((n,ni)=>{
      const pct=calcNeedPct(n,state.needLogs[ni]);
      if(pct<40) criticalNeeds++;
    });
  });

  document.getElementById('overview-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Learning Pillars</div><div class="stat-val">${totalPillars}</div><div class="stat-sub">${activePillars} active</div></div>
    <div class="stat-card"><div class="stat-label">Milestones</div><div class="stat-val">${doneMilestones}/${totalMilestones}</div><div class="stat-sub">${totalMilestones>0?Math.round(doneMilestones/totalMilestones*100):0}% complete</div></div>
    <div class="stat-card"><div class="stat-label">Needs Attention</div><div class="stat-val">${criticalNeeds}</div><div class="stat-sub">${criticalNeeds===0?'All good! ✨':'needs are decaying'}</div></div>
    <div class="stat-card"><div class="stat-label">Categories</div><div class="stat-val">7</div><div class="stat-sub">creative · language · code · more</div></div>
  `;

  // Decay alerts
  const alerts=[];
  PILLARS.forEach(p=>{
    const state=getState(p.id);
    p.needs.forEach((n,ni)=>{
      const pct=calcNeedPct(n,state.needLogs[ni]);
      if(pct<20){
        alerts.push({pillar:p.name,emoji:p.emoji,need:n.name,pct});
      }
    });
  });
  const alertDiv=document.getElementById('decay-alerts');
  if(alerts.length>0){
    alertDiv.innerHTML=`<div class="alert-bar warning">⚠️ <span class="alert-count">${alerts.length}</span> needs are critical: ${alerts.slice(0,3).map(a=>`${a.emoji} ${a.pillar} — ${a.need}`).join(' · ')}${alerts.length>3?' + '+(alerts.length-3)+' more':''}</div>`;
  } else {
    alertDiv.innerHTML='';
  }
}

let currentFilter='all';
function filterCat(cat){
  currentFilter=cat;

function renderPillarGrid(){
  const grid=document.getElementById('pillar-grid');
  grid.innerHTML='';
  const filtered=currentFilter==='all'?PILLARS:PILLARS.filter(p=>p.cat===currentFilter);
  
  filtered.forEach(p=>{
    const state=getState(p.id);
    const level=calcLevel(p,state);
    const progress=overallProgress(p,state);
    const levelName=p.levels[level]||p.levels[0];
    
    // Calc needs
    let worstNeed=100;
    let needsHtml='';
    p.needs.forEach((n,ni)=>{
      const pct=calcNeedPct(n,state.needLogs[ni]);
      if(pct<worstNeed)worstNeed=pct;
      needsHtml+=`<div class="pw-need-pip"><div class="pw-need-fill" style="width:${pct}%;background:${getNeedColor(pct)};border-radius:3px"></div></div>`;
    });
    
    const hasAlert=worstNeed<30;
    const levelColors={Beginner:'var(--muted)',Novice:'var(--blue)',Intermediate:'var(--purple)',Advanced:'var(--orange)',Master:'var(--gold)',Comfortable:'var(--green)','Power User':'var(--teal)',Hardcore:'var(--orange)',Expert:'var(--gold)',Conversational:'var(--green)',Fluent:'var(--gold)',Published:'var(--gold)',Released:'var(--gold)',Maker:'var(--gold)',Maxed:'var(--gold)'};
    const lc=levelColors[levelName]||'var(--muted)';
    
    const widget=document.createElement('div');
    widget.className='pillar-widget';
    widget.style.cssText=`--pc:${p.color}`;
    widget.onclick=()=>openPillar(p.id);
    widget.innerHTML=`
      ${hasAlert?'<div class="pw-alert"></div>':''}
      <div class="pw-top">
        <div class="pw-emoji">${p.emoji}</div>
        <div style="flex:1">
          <div class="pw-name">${p.name}</div>
          <span class="pw-level" style="background:${lc}18;color:${lc};border:1px solid ${lc}44">${levelName}</span>
        </div>
      </div>
      <div class="pw-needs">${needsHtml}</div>
      <div class="pw-meta">
        <span>${progress}% mastered</span>
        <span>${Object.keys(state.milestones).filter(k=>state.milestones[k]).length}/${p.milestones.length} milestones</span>
      </div>
    `;
    grid.appendChild(widget);
  });
}

function refreshPillarPage(id){
  const p=PILLARS.find(x=>x.id===id);
  const state=getState(id);
  const level=calcLevel(p,state);
  const levelName=p.levels[level]||p.levels[0];
  
  // Level badge
  document.getElementById('pp-level-'+id).innerHTML=`⭐ ${levelName}`;
  
  // Level segments
  const levelsDiv=document.getElementById('pp-levels-'+id);
  const labelsDiv=document.getElementById('pp-level-labels-'+id);
  levelsDiv.innerHTML='';
  labelsDiv.innerHTML='';
  p.levels.forEach((lv,li)=>{
    const msForLevel=p.milestones.filter(m=>m.level===li);
    const doneForLevel=msForLevel.filter((m,mi)=>{
      const realIdx=p.milestones.indexOf(m);
      return state.milestones[realIdx];
    }).length;
    const pct=msForLevel.length>0?Math.round(doneForLevel/msForLevel.length*100):0;
    const filled=li<level?100:li===level?pct:0;
    levelsDiv.innerHTML+=`<div class="level-seg"><div class="level-seg-fill" style="width:${filled}%;background:${p.color}"></div></div>`;
    labelsDiv.innerHTML+=`<span style="${li<=level?'color:'+p.color+';font-weight:700':''}">${lv}</span>`;
  });
  
  // Needs
  const needsDiv=document.getElementById('pp-needs-'+id);
  needsDiv.innerHTML='';
  p.needs.forEach((n,ni)=>{
    const pct=calcNeedPct(n,state.needLogs[ni]);
    const status=getNeedStatus(pct);
    const color=getNeedColor(pct);
    const lastLog=state.needLogs[ni];
    const lastStr=lastLog?timeAgo(new Date(lastLog)):'never';
    
    needsDiv.innerHTML+=`
      <div class="need-bar">
        <div class="need-header">
          <div class="need-name">${n.name} <span style="font-size:9px;color:var(--muted);font-weight:400">(${n.freq})</span></div>

        <div class="need-track"><div class="need-fill ${pct<20?'critical':''}" style="width:${pct}%;background:${color}"></div></div>
        <div class="need-meta"><span>Last: ${lastStr}</span><span>Decays in ${n.decayDays} days of inactivity</span></div>
      </div>
    `;
  });
  
  // Steps
  const stepsDiv=document.getElementById('pp-steps-'+id);
  stepsDiv.innerHTML='';
  const doneSteps=Object.keys(state.steps).filter(k=>state.steps[k]).length;
  document.getElementById('pp-steps-count-'+id).textContent=`${doneSteps}/${p.steps.length} done`;
  p.steps.forEach((step,si)=>{
    const done=state.steps[si];
    stepsDiv.innerHTML+=`
      <div class="check-item" onclick="toggleStep('${id}',${si})">
        <div class="check-box ${done?'done':''}">${done?'✓':''}</div>
        <span class="check-text ${done?'done-text':''}">${si+1}. ${step}</span>
      </div>
    `;
  });
  
  // Milestones
  const msDiv=document.getElementById('pp-milestones-'+id);
  msDiv.innerHTML='';
  const doneMs=Object.keys(state.milestones).filter(k=>state.milestones[k]).length;
  document.getElementById('pp-ms-count-'+id).textContent=`${doneMs}/${p.milestones.length} achieved`;
  p.milestones.forEach((m,mi)=>{
    const done=state.milestones[mi];
    const levelName=p.levels[m.level];
    const levelColors=['var(--muted)','var(--blue)','var(--purple)','var(--orange)','var(--gold)'];
    const lc=levelColors[m.level]||'var(--muted)';
    msDiv.innerHTML+=`
      <div class="milestone ${done?'done':''}" onclick="toggleMilestone('${id}',${mi})">
        <div class="ms-check ${done?'done':''}">${done?'✓':''}</div>

        <span class="ms-level" style="background:${lc}18;color:${lc};border:1px solid ${lc}44">${levelName}</span>
      </div>
    `;
  });
}

window.logNeed=function(id,ni){
  const state=getState(id);
  state.needLogs[ni]=new Date().toISOString();
  saveState(id,state);
  refreshPillarPage(id);
};

window.toggleStep=function(id,si){
  const state=getState(id);
  state.steps[si]=!state.steps[si];
  saveState(id,state);
  refreshPillarPage(id);
};

window.toggleMilestone=function(id,mi){
  const state=getState(id);
  state.milestones[mi]=!state.milestones[mi];
  saveState(id,state);
  refreshPillarPage(id);
};

window.saveNotes=function(id){
  const state=getState(id);
  state.notes=document.getElementById('pp-notes-'+id).value;
  saveState(id,state);
  const saved=document.getElementById('pp-notes-saved-'+id);
  saved.style.color='var(--green)';saved.textContent='Saved ✨';
  setTimeout(()=>saved.textContent='',2000);
};

// ========================= HELPERS =========================
function timeAgo(date){
  const now=new Date();
  const diff=now-date;
  const mins=Math.floor(diff/60000);
  const hours=Math.floor(diff/3600000);
  const days=Math.floor(diff/86400000);
  if(mins<60)return mins+'m ago';
  if(hours<24)return hours+'h ago';
  if(days===1)return 'yesterday';
  if(days<7)return days+'d ago';
  if(days<30)return Math.floor(days/7)+'w ago';
  return Math.floor(days/30)+'mo ago';
}

function goBack(){
  window.location.href='index.html';
}
